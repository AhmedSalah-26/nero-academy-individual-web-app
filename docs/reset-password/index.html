<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nero Academy - Reset Password</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: linear-gradient(160deg, #f3f6ff 0%, #fff 50%, #eef4ff 100%);
        color: #0f172a;
      }
      .card {
        width: min(94vw, 460px);
        background: #ffffff;
        border-radius: 18px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 18px 50px rgba(2, 6, 23, 0.08);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 16px;
        color: #475569;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin: 12px 0 6px;
      }
      input {
        width: 100%;
        height: 44px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        padding: 0 12px;
        font-size: 15px;
      }
      input:focus {
        border-color: #2563eb;
        outline: none;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }
      button {
        width: 100%;
        margin-top: 16px;
        height: 46px;
        border: 0;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        background: #2563eb;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.7;
      }
      .hint {
        margin-top: 8px;
        font-size: 13px;
        color: #64748b;
      }
      .message {
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 12px;
        font-size: 14px;
        display: none;
      }
      .message.show {
        display: block;
      }
      .message.error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #b91c1c;
      }
      .message.success {
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
        color: #065f46;
      }
      .done {
        margin-top: 14px;
        font-size: 14px;
        color: #334155;
      }
      .hidden {
        display: none;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Reset Password</h1>
      <p>Set a new password for your Nero Academy account.</p>

      <div id="status" class="message"></div>

      <form id="resetForm" class="hidden">
        <label for="password">New password</label>
        <input id="password" type="password" autocomplete="new-password" required />

        <label for="confirmPassword">Confirm new password</label>
        <input
          id="confirmPassword"
          type="password"
          autocomplete="new-password"
          required
        />

        <button id="submitBtn" type="submit">Update password</button>
        <div class="hint">Password must be at least 8 characters.</div>
      </form>

      <div id="done" class="done hidden">
        Password changed successfully. You can now return to the app and sign in.
      </div>
    </main>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      const SUPABASE_URL = "https://ubjhdafxmncfbaldfivd.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_wJvu57s6WvTFFi9JTZhBbg_mS3tYCE7";

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false,
        },
      });

      const form = document.getElementById("resetForm");
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirmPassword");
      const submitBtn = document.getElementById("submitBtn");
      const statusBox = document.getElementById("status");
      const doneBox = document.getElementById("done");

      function showMessage(text, type) {
        statusBox.textContent = text;
        statusBox.className = `message show ${type}`;
      }

      function parseHashParams() {
        const hash = window.location.hash.startsWith("#")
          ? window.location.hash.slice(1)
          : "";
        return new URLSearchParams(hash);
      }

      function parseAuthError(queryParams, hashParams) {
        const errorCode = queryParams.get("error_code") ?? hashParams.get("error_code");
        const errorDescription =
          queryParams.get("error_description") ?? hashParams.get("error_description");

        if (!errorCode && !errorDescription) return null;

        if (errorCode === "otp_expired") {
          return "This reset link has expired. Please request a new one.";
        }

        if (errorDescription) {
          return decodeURIComponent(errorDescription.replace(/\+/g, " "));
        }

        return "Invalid reset link. Please request a new one.";
      }

      async function initRecoverySession() {
        const hashParams = parseHashParams();
        const queryParams = new URLSearchParams(window.location.search);

        const authErrorMessage = parseAuthError(queryParams, hashParams);
        if (authErrorMessage) {
          throw new Error(authErrorMessage);
        }

        const accessToken = hashParams.get("access_token") ?? queryParams.get("access_token");
        const refreshToken = hashParams.get("refresh_token") ?? queryParams.get("refresh_token");
        const tokenHash = queryParams.get("token_hash") ?? hashParams.get("token_hash");
        const type = queryParams.get("type") ?? hashParams.get("type");
        const code = queryParams.get("code") ?? hashParams.get("code");

        if (accessToken && refreshToken) {
          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });
          if (error) throw error;
          return;
        }

        if (tokenHash && type === "recovery") {
          const { error } = await supabase.auth.verifyOtp({
            type: "recovery",
            token_hash: tokenHash,
          });
          if (error) throw error;
          return;
        }

        if (code) {
          try {
            const { error } = await supabase.auth.exchangeCodeForSession(code);
            if (error) throw error;
            return;
          } catch (error) {
            const message = String(error?.message || "").toLowerCase();
            if (message.includes("code verifier")) {
              throw new Error(
                "This link was opened in a different browser/device. Request a new reset link and open it directly.",
              );
            }
            throw error;
          }
        }

        throw new Error("Invalid or expired reset link. Please request a new one.");
      }

      async function bootstrap() {
        try {
          await initRecoverySession();
          form.classList.remove("hidden");
          showMessage("Link verified. Enter your new password.", "success");
          window.history.replaceState({}, "", window.location.pathname);
        } catch (error) {
          showMessage(error.message || "Could not verify reset link.", "error");
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const password = passwordInput.value.trim();
        const confirmPassword = confirmInput.value.trim();

        if (password.length < 8) {
          showMessage("Password must be at least 8 characters.", "error");
          return;
        }

        if (password !== confirmPassword) {
          showMessage("Passwords do not match.", "error");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Updating...";

        const { error } = await supabase.auth.updateUser({ password });

        if (error) {
          showMessage(error.message || "Failed to update password.", "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Update password";
          return;
        }

        form.classList.add("hidden");
        doneBox.classList.remove("hidden");
        showMessage("Password updated successfully.", "success");
        await supabase.auth.signOut();
      });

      bootstrap();
    </script>
  </body>
</html>
