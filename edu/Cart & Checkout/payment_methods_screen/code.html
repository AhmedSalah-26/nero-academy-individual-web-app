<div class="h-6 w-full bg-white dark:bg-gray-900"></div>
<script>
        // Simple script to handle radio selection visual feedback
        const radios = document.querySelectorAll('input[name="payment_method"]');
        radios.forEach(radio => {
            radio.addEventListener('change', function() {
                // Reset all labels styling
                document.querySelectorAll('label').forEach(lbl => {
                    lbl.classList.remove('border-primary', 'border-2');
                    lbl.classList.add('border-gray-200', 'dark:border-gray-700');
                    const icon = lbl.querySelector('.material-symbols-outlined.text-primary');
                    if(icon) icon.classList.add('opacity-0');
                    if(icon) icon.classList.remove('opacity-100');
                });

                // Style active label
                if(this.checked) {
                    const label = this.closest('label');
                    label.classList.remove('border-gray-200', 'dark:border-gray-700');
                    label.classList.add('border-primary', 'border-2');
                    const icon = label.querySelector('.material-symbols-outlined.text-primary');
                    if(icon) icon.classList.remove('opacity-0');
                    if(icon) icon.classList.add('opacity-100');
                }
            });
        });
    </script>
