<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Course Rating Screen</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "primary-dark": "#5e0eb0",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2d1f3d",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "glow": "0 0 20px -5px rgba(127, 19, 236, 0.3)"
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Smooth transitions */
        .transition-all-custom {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 font-display text-gray-900 antialiased selection:bg-primary selection:text-white">
<!-- Mobile Container -->
<div class="relative mx-auto flex h-screen w-full max-w-md flex-col overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl sm:rounded-3xl sm:h-[850px] sm:my-10 border-0 sm:border border-gray-200 dark:border-gray-800">
<!-- Bottom Sheet Handle -->
<div class="flex w-full flex-col items-center pt-3 pb-2 shrink-0">
<div class="h-1.5 w-12 rounded-full bg-gray-300 dark:bg-gray-600"></div>
</div>
<!-- Header -->
<header class="flex items-center justify-between px-5 py-3 shrink-0">
<button class="text-base font-medium text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors">
                Cancel
            </button>
<h1 class="text-lg font-bold tracking-tight text-gray-900 dark:text-white">Write a Review</h1>
<button class="text-base font-semibold text-primary hover:text-primary-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
<!-- Placeholder for balance, or could be "Reset" -->
</button>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto overflow-x-hidden no-scrollbar px-5 pb-24">
<!-- Course Summary Card -->
<div class="mt-4 flex items-center gap-4 rounded-2xl bg-surface-light dark:bg-surface-dark p-3 shadow-sm border border-gray-100 dark:border-white/5">
<div class="relative h-16 w-16 shrink-0 overflow-hidden rounded-xl bg-gray-200">
<div class="h-full w-full bg-cover bg-center" data-alt="Abstract python code on a screen representing a programming course" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDvuyEyoqeDl4Xa1L_EfPiaDQ9hXYGtr2fvd9LIBeuSNP3zE1vlXwDpkgFXc80jIrHkGk455_lELbu35wcYrgR9GMhVHmfV-pscAWAkdpiwmeqKHFQNwtH9XB9Kzp5wqnRxWmKjhWxACYtDj0Z1f3YodOkCVwMLJjJk7iS3sCJJN3hLsoDV_Ov-Ecd_0iuy5yHXv2mFEuIV15UnE4oyJ_1Cp9ikEhe_R8pkYHx94HdZ0ekn1ZliGFW7v1SoUZFRtiI8Vz9rAwItakoT");'>
</div>
</div>
<div class="flex flex-col justify-center">
<h3 class="line-clamp-1 text-base font-bold text-gray-900 dark:text-white">Advanced Python Bootcamp</h3>
<p class="line-clamp-1 text-sm text-gray-500 dark:text-gray-400">Dr. Angela Yu</p>
</div>
</div>
<!-- Rating Section -->
<div class="mt-8 flex flex-col items-center">
<h2 class="text-2xl font-bold text-gray-900 dark:text-white">How was the course?</h2>
<p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Your feedback helps others learn better.</p>
<!-- Stars -->
<div class="mt-6 flex items-center gap-3">
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-4xl text-primary font-variation-FILL fill-1" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<!-- Empty star for 4/5 state -->
<span class="material-symbols-outlined text-4xl text-gray-300 dark:text-gray-600 hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
</div>
<!-- Rating Label -->
<div class="mt-3 text-lg font-medium text-primary">
                    Good, solid course!
                </div>
</div>
<!-- Quick Tags -->
<div class="mt-10">
<label class="mb-3 block text-sm font-semibold text-gray-900 dark:text-white">What did you like most?</label>
<div class="flex flex-wrap gap-2.5">
<!-- Active Tag -->
<button class="inline-flex items-center rounded-full border border-primary bg-primary/10 px-4 py-2 text-sm font-medium text-primary dark:bg-primary/20 transition-colors">
<span class="material-symbols-outlined mr-1.5 text-[18px]">mic</span>
                        Clear Audio
                    </button>
<!-- Inactive Tags -->
<button class="inline-flex items-center rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-600 hover:border-primary/50 hover:bg-gray-50 dark:border-gray-700 dark:bg-white/5 dark:text-gray-300 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined mr-1.5 text-[18px]">school</span>
                        Great Instructor
                    </button>
<button class="inline-flex items-center rounded-full border border-primary bg-primary/10 px-4 py-2 text-sm font-medium text-primary dark:bg-primary/20 transition-colors">
<span class="material-symbols-outlined mr-1.5 text-[18px]">code</span>
                        Helpful Examples
                    </button>
<button class="inline-flex items-center rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-600 hover:border-primary/50 hover:bg-gray-50 dark:border-gray-700 dark:bg-white/5 dark:text-gray-300 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined mr-1.5 text-[18px]">schedule</span>
                        Good Pacing
                    </button>
<button class="inline-flex items-center rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-600 hover:border-primary/50 hover:bg-gray-50 dark:border-gray-700 dark:bg-white/5 dark:text-gray-300 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined mr-1.5 text-[18px]">forum</span>
                        Engaging
                    </button>
</div>
</div>
<!-- Review Text Area -->
<div class="mt-8">
<label class="mb-3 block text-sm font-semibold text-gray-900 dark:text-white" for="review-text">Describe your experience <span class="text-gray-400 font-normal ml-1">(Optional)</span></label>
<div class="relative">
<textarea class="block w-full rounded-2xl border-0 bg-surface-light dark:bg-surface-dark p-4 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary dark:text-white dark:ring-white/10 dark:focus:ring-primary sm:text-sm sm:leading-6 resize-none" id="review-text" placeholder="Tell us what you liked or what could be improved..." rows="5"></textarea>
<!-- Character count hint -->
<div class="absolute bottom-3 right-3 text-xs text-gray-400 pointer-events-none">
                        0/500
                    </div>
</div>
</div>
</main>
<!-- Fixed Bottom Action -->
<div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark pt-10 pb-6 px-5 pointer-events-none">
<button class="pointer-events-auto flex w-full items-center justify-center rounded-xl bg-primary px-4 py-4 text-base font-bold text-white shadow-glow transition-all hover:bg-primary-dark active:scale-[0.98]">
                Submit Review
            </button>
</div>
</div>
</body></html>
