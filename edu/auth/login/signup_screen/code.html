<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Education App Login</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "primary-hover": "#690ec4",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display antialiased text-slate-900 dark:text-white selection:bg-primary selection:text-white p-4">
<div class="w-full max-w-[400px] flex flex-col gap-6">
<div class="flex flex-col items-center pt-8 pb-4">
<div class="mb-6 h-20 w-20 rounded-2xl bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl">school</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-center leading-tight mb-2">Join our community</h1>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm">Create an account to start your journey</p>
</div>
<div class="w-full">
<div class="flex h-12 w-full items-center rounded-xl bg-slate-200 dark:bg-slate-800/50 p-1">
<label class="flex h-full flex-1 cursor-pointer items-center justify-center rounded-lg px-2 transition-all has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary font-medium text-slate-500 dark:text-slate-400">
<span class="text-sm">Log In</span>
<input class="hidden" name="auth-mode" type="radio" value="login"/>
</label>
<label class="flex h-full flex-1 cursor-pointer items-center justify-center rounded-lg px-2 transition-all has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary font-medium text-slate-500 dark:text-slate-400">
<span class="text-sm">Sign Up</span>
<input checked="" class="hidden" name="auth-mode" type="radio" value="signup"/>
</label>
</div>
</div>
<form action="#" class="flex flex-col gap-4" method="POST" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-3">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">I am a</label>
<div class="grid grid-cols-3 gap-3">
<label class="cursor-pointer relative group">
<input class="peer sr-only" name="role" type="radio" value="instructor"/>
<div class="flex flex-col items-center justify-center py-4 px-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all h-full shadow-sm peer-focus:ring-2 peer-focus:ring-primary/20">
<span class="material-symbols-outlined mb-2 text-2xl">cast_for_education</span>
<span class="text-xs font-semibold">Instructor</span>
</div>
</label>
<label class="cursor-pointer relative group">
<input checked="" class="peer sr-only" name="role" type="radio" value="student"/>
<div class="flex flex-col items-center justify-center py-4 px-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all h-full shadow-sm peer-focus:ring-2 peer-focus:ring-primary/20">
<span class="material-symbols-outlined mb-2 text-2xl">school</span>
<span class="text-xs font-semibold">Student</span>
</div>
<div class="absolute -top-1 -right-1 h-5 w-5 bg-primary text-white rounded-full flex items-center justify-center shadow-sm opacity-0 peer-checked:opacity-100 transition-opacity transform scale-0 peer-checked:scale-100">
<span class="material-symbols-outlined text-[14px]">check</span>
</div>
</label>
<label class="cursor-pointer relative group">
<input class="peer sr-only" name="role" type="radio" value="parent"/>
<div class="flex flex-col items-center justify-center py-4 px-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all h-full shadow-sm peer-focus:ring-2 peer-focus:ring-primary/20">
<span class="material-symbols-outlined mb-2 text-2xl">family_restroom</span>
<span class="text-xs font-semibold">Parent</span>
</div>
</label>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 pl-11 pr-4 py-3.5 text-base placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:focus:border-primary dark:focus:ring-primary transition-all shadow-sm" id="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 pl-11 pr-12 py-3.5 text-base placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:focus:border-primary dark:focus:ring-primary transition-all shadow-sm" id="password" placeholder="Create a password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 cursor-pointer" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<p class="text-xs text-slate-400 mt-1">Must be at least 8 characters</p>
</div>
<button class="mt-2 w-full flex items-center justify-center gap-2 rounded-xl bg-primary px-4 py-4 text-base font-bold text-white shadow-lg shadow-primary/20 hover:bg-primary-hover active:scale-[0.98] transition-all" type="submit">
                Create Account
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-sm font-medium">Or register with</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="grid grid-cols-3 gap-4">
<button class="flex items-center justify-center h-14 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
<svg class="h-6 w-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="flex items-center justify-center h-14 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm text-black dark:text-white">
<svg class="h-6 w-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.38-1.09-.52-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.48C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74 1.18 0 2.48-.93 3.99-.36 1.58.6 2.39 1.83 2.72 2.76-2.64 1.35-2.3 5.37.52 6.53-.56 1.4-1.28 2.5-2.31 3.3zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"></path>
</svg>
</button>
<button class="flex items-center justify-center h-14 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
<svg class="h-6 w-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.17 6 13.5 6c1.12 0 2.29.2 2.29.2v2.5h-1.3c-1.24 0-1.63.77-1.63 1.55V12h2.8l-.45 3h-2.35v6.8c4.56-.93 8-4.96 8-9.8z" fill="#1877F2"></path>
</svg>
</button>
</div>
<div class="mt-auto pt-6 pb-2 text-center">
<p class="text-xs text-slate-400 leading-relaxed">
                By continuing, you agree to our 
                <a class="underline hover:text-primary transition-colors" href="#">Terms of Service</a> 
                and 
                <a class="underline hover:text-primary transition-colors" href="#">Privacy Policy</a>.
            </p>
</div>
</div>

</body></html>
