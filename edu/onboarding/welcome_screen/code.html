<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Screen</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Material Symbols Class */
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-[#140d1b] dark:text-white transition-colors duration-300">
<div class="relative flex h-[100dvh] w-full flex-col overflow-hidden">
<!-- Header: Skip Button -->
<div class="flex px-6 pt-12 pb-2 justify-end z-20">
<button class="group flex items-center justify-center rounded-full px-4 py-2 bg-transparent text-[#140d1b]/60 dark:text-white/60 text-sm font-bold tracking-wide hover:bg-[#140d1b]/5 dark:hover:bg-white/10 transition">
<span class="mr-1">Skip</span>
<span class="material-symbols-outlined text-[18px] opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">chevron_right</span>
</button>
</div>
<!-- Main Content: Hero & Text -->
<div class="flex-1 flex flex-col items-center justify-start px-6 pb-4 relative z-10">
<!-- Hero Image Section -->
<div class="w-full flex-1 min-h-[320px] relative mb-8 flex items-center justify-center">
<!-- Decorative background blob/shape -->
<div class="absolute w-[110%] h-[90%] bg-primary/10 dark:bg-primary/20 rounded-[40px] rotate-6 scale-90 blur-sm"></div>
<div class="absolute w-[110%] h-[90%] bg-[#dbcfe7]/40 dark:bg-[#7f13ec]/10 rounded-[40px] -rotate-3 scale-95"></div>
<!-- Main Image Card -->
<div class="relative w-full h-full max-h-[55vh] rounded-[32px] overflow-hidden shadow-2xl shadow-primary/10 ring-1 ring-black/5 dark:ring-white/10">
<div class="w-full h-full bg-center bg-cover transform transition-transform duration-700 hover:scale-105" data-alt="Happy student holding a smartphone and smiling while learning online" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCvy5A4pAAUNde8Z6LTh5F6C27dzDPair__3got4ZrzL6oF_pARECEIkJWMQDxkxF_wVG2tiE0fGpq9bYXGctzn_BTvCfHbUMnUZ-sDU5GUUphUk0eK_Ad96SVnleKJ2dWZj4EJscgZXCq5mPyLBzKy9Z6xNkkKQysbAYNJDHbArVPUG2g-SUQCVKdFBXgvZDJIiwWkUxfLh19af8vFz5eAojaNP1qAk70jcKRkqED0wxW4ada2cDlREZxnEQbt0gLNABcrqWe8alZQ");'>
<!-- Gradient Overlay for better contrast if needed, mostly transparent here -->
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-40"></div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="w-full text-center space-y-4 max-w-md mx-auto">
<h1 class="text-[#140d1b] dark:text-white tracking-tight text-[32px] font-bold leading-[1.15]">
                    Unlock Your Potential
                </h1>
<p class="text-[#140d1b]/70 dark:text-white/70 text-base font-normal leading-relaxed px-2">
                    Access thousands of courses from expert instructors worldwide and start learning today.
                </p>
</div>
<!-- Pagination Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-2 pt-8 pb-2">
<div class="h-2 w-8 rounded-full bg-primary shadow-sm shadow-primary/50 transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-[#dbcfe7] dark:bg-white/20"></div>
<div class="h-2 w-2 rounded-full bg-[#dbcfe7] dark:bg-white/20"></div>
</div>
</div>
<!-- Sticky Footer: Actions -->
<div class="w-full px-6 pb-10 pt-2 bg-background-light dark:bg-background-dark z-20">
<div class="flex flex-col gap-3 max-w-md mx-auto">
<button class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary h-14 px-4 text-white text-lg font-bold shadow-lg shadow-primary/30 hover:bg-[#6910c4] active:scale-[0.98] transition-all">
<span>Create Account</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="flex w-full items-center justify-center rounded-xl bg-transparent h-12 px-4 text-primary dark:text-[#a65df3] text-base font-bold hover:bg-primary/5 dark:hover:bg-white/5 transition-colors">
                    Log In
                </button>
</div>
</div>
</div>
</body></html>
